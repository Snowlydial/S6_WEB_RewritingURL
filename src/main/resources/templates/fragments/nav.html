<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Top Navigation Fragment -->
<nav class="site-nav" th:fragment="topNav">
    <a th:href="@{/}" class="site-nav__logo display">
        Iran<span>Info</span>
    </a>
    <ul class="site-nav__links">
        <li><a th:href="@{/article/list}">Articles</a></li>
        <li><a th:href="@{/article/add}" class="active">Rédaction</a></li>
        <li><a th:href="@{/logout}">Déconnexion</a></li>
    </ul>
</nav>

<!-- Sidebar Fragment -->
<aside class="bo-sidebar" th:fragment="sidebar">
    <div class="bo-sidebar__section">
        <span class="section-label">Contenu</span>
    </div>
    <nav class="bo-sidebar__nav">
        <a th:href="@{/article/list}">
            <span class="bo-sidebar__dot"></span> Tous les articles
        </a>
        <a th:href="@{/article/add}" class="active">
            <span class="bo-sidebar__dot"></span> Nouvel article
        </a>
    </nav>

    <div class="bo-sidebar__section" style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--grey-2);">
        <span class="section-label">Système</span>
    </div>
    <nav class="bo-sidebar__nav">
        <a th:href="@{/logout}">
            <span class="bo-sidebar__dot"></span> Déconnexion
        </a>
    </nav>
</aside>

</body>
</html>
