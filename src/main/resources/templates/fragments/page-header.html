<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Page Header Fragment: Pass title and subtitle as parameters -->
<div class="bo-page-header" th:fragment="header(pageTitle, subtitle)">
    <div class="bo-page-header__left">
        <span class="accent-bar"></span>
        <h1 th:text="${pageTitle}">Page Title</h1>
    </div>
    <span class="section-label" th:text="${subtitle}">Subtitle</span>
</div>

</body>
</html>
