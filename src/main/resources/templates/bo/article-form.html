<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — IranInfo BO'">Article Form — IranInfo BO</title>
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/article-form.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script src="https://cdn.tiny.cloud/1/skykruf2h2iyzyisptxniimfug06dngjqysr4dm32mi64a9j/tinymce/8/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>
</head>
<body>

<th:block th:replace="fragments/nav :: topNav"></th:block>
<div class="bo-layout">
    <th:block th:replace="fragments/nav :: sidebar"></th:block>
    <!-- Main -->
    <main class="bo-main">

        <div th:replace="fragments/page-header :: header(${pageTitle}, ${article.id != null ? 'ID #' + article.id : 'Nouveau'})"></div>

        <form th:action="@{/article/save}" th:object="${article}"
              method="post" class="article-form">

            <!-- Row: title + authors -->
            <div class="form-row">
                <div class="field">
                    <label for="title">Titre de l'article</label>
                    <input type="text" id="title" th:field="*{title}"
                           placeholder="Saisir un titre..." />
                </div>
                <div class="field">
                    <label for="authors">Auteur(s)</label>
                    <input type="text" id="authors" th:field="*{authors}"
                           placeholder="Nom_Prénom1, Nom_Prénom2, etc..." />
                </div>
            </div>

            <!-- Editor -->
            <div class="form-block form-block--editor">
                <div class="field">
                    <label class="section-label">Contenu</label>
                    <textarea id="contentEditor" th:field="*{content}"></textarea>
                </div>
            </div>

            <!-- Hidden fields -->
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{createdAt}" />

            <!-- Actions -->
            <div class="form-actions">
                <a th:href="@{/article/list}" class="btn btn--ghost">Annuler</a>
                <button type="submit" class="btn btn--primary">
                    Enregistrer l'article
                </button>
            </div>

        </form>
    </main>
</div>
</body>
</html>

<script>
    tinymce.init({
        selector: '#contentEditor',
        plugins: [
            'anchor', 'autolink', 'charmap', 'codesample', 'emoticons',
            'link', 'lists', 'image', 'media', 'searchreplace',
            'table', 'visualblocks', 'wordcount'
        ],
        toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link media table | align lineheight | checklist numlist bullist indent outdent | image | removeformat',
        images_upload_url: '/article/upload-image',
        automatic_uploads: true,
        images_reuse_filename: true,
        convert_urls: false,
        skin: 'oxide-dark',
        content_css: 'dark',
        height: 520,
        menubar: false,
        branding: false,
        tinycomments_mode: 'embedded',
        tinycomments_author: 'Author name',
        uploadcare_public_key: 'a0805c39252e588f44e2',
        images_upload_handler: function (blobInfo, progress) {
            return new Promise((resolve, reject) => {
                const csrf = document.querySelector('meta[name="_csrf"]').content;
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/article/upload-image');
                xhr.setRequestHeader(csrfHeader, csrf);

                xhr.upload.onprogress = (e) => progress(e.loaded / e.total * 100);

                xhr.onload = () => {
                    if (xhr.status !== 200) {
                        reject('Upload failed: ' + xhr.status);
                        return;
                    }
                    const json = JSON.parse(xhr.responseText);
                    resolve(json.location);
                };
                xhr.onerror = () => reject('Upload failed');

                const formData = new FormData();
                formData.append('file', blobInfo.blob(), blobInfo.filename());
                xhr.send(formData);
            });
        },
    });
</script>

</body>
</html>
